# google_sheets_docs Community Connector Spec
# This file defines the specification for the connector including
# connection parameters and allowlist options.

# ============================================================================
# Connection Parameters
# These are provided when creating the Unity Catalog connection.
# ============================================================================
connection:
  parameters:
    - name: client_id
      type: string
      required: true
      description: >
        OAuth 2.0 client ID from Google Cloud Console.

    - name: client_secret
      type: string
      required: true
      description: >
        OAuth 2.0 client secret from Google Cloud Console.

    - name: refresh_token
      type: string
      required: true
      description: >
        Long-lived refresh token obtained with access_type=offline during
        authorization. Used to obtain access tokens at runtime.

  oauth:
    authorization_url: "https://accounts.google.com/o/oauth2/v2/auth"
    token_url: "https://oauth2.googleapis.com/token"
    scopes: >
      https://www.googleapis.com/auth/spreadsheets.readonly
      https://www.googleapis.com/auth/documents.readonly
      https://www.googleapis.com/auth/drive.readonly
    extra_auth_params:
      access_type: "offline"
      prompt: "consent"

# ============================================================================
# External Options Allowlist
# These table-specific options must be included in the externalOptionsAllowList
# parameter of the UC connection to allow them to be passed through.
# Use a comma-separated string of option names.
# If no table-specific options are needed, set to empty string or omit.
# ============================================================================
external_options_allowlist: "spreadsheet_id,spreadsheetId,sheet_name,range,include_content"

# ============================================================================
# Supported Tables
# ============================================================================
# - spreadsheets:  Drive file list (mimeType=spreadsheet); no table_options.
# - sheet_values: Cell data via Sheets API; requires spreadsheet_id or spreadsheetId.
# - documents:    Drive file list (mimeType=document); optional include_content.
#
# ============================================================================
# Table Options Documentation
# ============================================================================
# sheet_values:
#   spreadsheet_id / spreadsheetId:  Required. ID of the Google Spreadsheet.
#   sheet_name:                      Optional. Sheet tab name (default: "Sheet1").
#   range:                           Optional. A1 notation range (default: "A:Z").
#
# documents:
#   include_content:                 Optional. If "true", "1", or "yes", fetches
#                                    document body via Docs API (plain text).
